name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: typecheck (shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # `isolated-vm` のネイティブビルドが server で発生するためインストールは shared だけに絞る。
      # (test/typecheck では server を実行しないので isolated-vm は不要だが、bun install
      #  はワークスペース全体の依存解決を行うため、ネイティブビルドが落ちる場合に備えて
      #  --ignore-scripts で postinstall をスキップする。)
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Typecheck shared
        run: bun --filter @jsreview/shared typecheck

  problems-regression:
    name: problems regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Run problems regression spec
        run: bun --filter @jsreview/shared test
