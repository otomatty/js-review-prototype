name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: typecheck (3 packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # 再現性のため固定。アップデート時は bun.lock も合わせて差し替える。
          bun-version: 1.3.11
      # `isolated-vm` のネイティブビルドが server で発生する。typecheck では
      # isolated-vm を実行しないので、 --ignore-scripts で postinstall をスキップする。
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Typecheck (shared / client / server)
        run: bun --filter '*' typecheck

  build-client:
    name: build (client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Build client
        run: bun --filter @jsreview/client build

  data-integrity:
    name: data integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Run integrity checks
        run: bun --filter @jsreview/shared check-integrity

  problems-regression:
    name: problems regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # 再現性のため固定。アップデート時は bun.lock も合わせて差し替える。
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Run problems regression spec
        run: bun --filter @jsreview/shared test
